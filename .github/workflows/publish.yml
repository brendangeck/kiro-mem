name: Publish to npm

# Publishes `kiro-mem` to the public npm registry on pushes to `main`,
# but only when `package.json#version` changes between the previous
# commit and HEAD. This means routine merges do nothing; a release is
# cut by landing a PR that bumps the version (and, by convention,
# updates the changelog).
#
# Guarding on the version field — rather than on tags — keeps the release
# story inside the normal PR flow: reviewers see the version bump in the
# diff, and there is no separate "remember to tag" step. A git tag is
# still created automatically on successful publish so the release is
# discoverable from the repo side.

on:
  push:
    branches: [main]

# Only one publish run at a time. If two merges land back-to-back, the
# second waits; it will then see the new version as "already published"
# and skip cleanly.
concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  check-version:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.diff.outputs.should-publish }}
      version: ${{ steps.diff.outputs.version }}
    steps:
      - name: Checkout (with history)
        uses: actions/checkout@v4
        with:
          # Need the previous commit to diff package.json against.
          fetch-depth: 2

      - name: Compare versions
        id: diff
        run: |
          current=$(node -p "require('./package.json').version")
          # HEAD^ may not exist on the very first commit of a repo; fall
          # back to empty-string comparison in that case.
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            previous=$(git show HEAD^:package.json | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{process.stdout.write(JSON.parse(s).version)})")
          else
            previous=""
          fi
          echo "current=$current"
          echo "previous=$previous"
          echo "version=$current" >> "$GITHUB_OUTPUT"
          if [ "$current" != "$previous" ]; then
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish ${{ needs.check-version.outputs.version }}
    needs: check-version
    if: needs.check-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # `id-token: write` enables npm provenance (OIDC-based supply-chain
    # attestation linking the published tarball back to this workflow
    # run). `contents: write` lets us push the release tag.
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # Re-run verification on the exact commit we're about to ship.
      # `prepublishOnly` already runs typecheck+lint+test+build, but
      # running them here as separate steps makes failures legible in
      # the workflow UI.
      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

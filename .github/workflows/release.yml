name: Release

# Runs semantic-release only after the CI workflow succeeds on `main`.
# This ensures typecheck, lint, test, and build all pass before we
# attempt to publish. No-ops gracefully when the commit range contains
# nothing releasable (e.g. only `chore:` / `docs:` commits).

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Serialize releases. If two merges land back-to-back, the second waits
# for the first to finish committing the version bump, then picks up
# from the new baseline.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run if CI succeeded. workflow_run fires on both success and
    # failure; this guard skips the release when CI is red.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # `contents: write` — push the chore(release) commit + tag.
    # `issues: write` + `pull-requests: write` — post release-comment
    # annotations on closed PRs and issues mentioned in the release.
    # `id-token: write` — enables npm provenance (OIDC attestation
    # linking the published tarball to this workflow run).
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # semantic-release needs the complete commit graph + tags to
          # compute the next version from the commit range.
          fetch-depth: 0
          # Do NOT persist credentials from checkout. The GH_TOKEN PAT
          # is only needed by the Release step (to push the chore(release)
          # commit and tag). Keeping persist-credentials: false avoids
          # storing a write-capable token in the runner's git config
          # during install/test steps where it isn't needed.
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure git credentials for release
        run: |
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: npx semantic-release
